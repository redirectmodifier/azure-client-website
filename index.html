<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Client</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* MAIN CARD */
.container {
    max-width: 500px;
    width: 90%;
}

/* TITLE */
h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

/* SUBTEXT */
p {
    opacity: 0.8;
    margin-bottom: 20px;
}

/* DOWNLOAD BUTTON */
.download-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 30px;
    border-radius: 12px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.download-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

/* INFO */
.info {
    margin-top: 25px;
    opacity: 0.7;
    font-size: 14px;
}

/* SOCIAL */
.socials {
    margin-top: 30px;
}

.socials a {
    display: inline-block;
    margin: 5px;
    padding: 10px 18px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

.discord {
    background: #5865F2;
}

.github {
    background: #24292e;
}

.socials a:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Azure Client</h1>
    <p>Minecraft 1.8 client with ViaMCP</p>

    <a href="https://tuo-link-download.com" target="_blank" class="download-btn">
        Download Now
    </a>

    <div class="info">
        <p>Version 1.0</p>
        <p>Compatible with modern versions</p>
    </div>

    <div class="socials">
        <a href="https://discord.gg/TUO_LINK" target="_blank" class="discord">Discord</a>
        <a href="https://github.com/TUO_PROFILO" target="_blank" class="github">GitHub</a>
    </div>
</div>

</body>
</html>
